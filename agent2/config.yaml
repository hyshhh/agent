# ============================================
# 智能救生行为识别 Agent - 全局配置
# ============================================

# ---------- 模型运行模式 ----------
# "api"   → 调用云端 API（阿里云百炼千问）
# "local" → 调用本地 vLLM 部署的模型
model_mode: "api"

# 千问云端 API 配置（model_mode = "api" 时生效）
qwen:
  api_key: ""                    # 也可通过环境变量 QWEN_API_KEY 设置
  api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # 阿里云百炼 OpenAI 兼容接口
  model: "qwen3-vl-flash"       # 使用的模型
  max_tokens: 100
  temperature: 0.01              # 低温度以获得更确定性的结果
  timeout: 30                    # 请求超时（秒）

# 本地 vLLM 模型配置（model_mode = "local" 时生效）
local_model:
  api_key: "abc123"              # vllm serve 启动时设置的 --api-key（无鉴权则留空）
  api_url: "http://localhost:7890/v1"  # vLLM OpenAI 兼容接口地址
  model: "Qwen/Qwen3-VL-4B-Instruct"  # --served-model-name 设置的模型名
  max_tokens: 512
  temperature: 0.1
  timeout: 60                    # 本地推理可能更慢，给长一点

# 人体检测器配置
detector:
  model: "yolov8n.pt"            # YOLOv8 模型文件（自动下载）
  confidence: 0.2                # 检测置信度阈值
  device: "cuda:0"               # 推理设备: cpu 或 cuda:0
  class_id: 0                    # COCO 中 person 类的 ID
  detect_width: 640              # 检测推理宽度（0=保持原始分辨率）
  detect_height: 640             # 检测推理高度（0=保持原始分辨率）

# 目标跟踪配置（ByteTrack）
tracker:
  enabled: true                  # 是否启用目标跟踪
  tracker_type: "bytetrack"      # 跟踪器类型: bytetrack / botsort
  track_high_thresh: 0.5         # 高置信度跟踪阈值
  track_low_thresh: 0.1          # 低置信度跟踪阈值（ByteTrack 二次匹配）
  match_thresh: 0.8              # 匹配阈值
  track_buffer: 30               # 跟踪丢失后保留帧数（ID保持时间）

# 关键帧提取配置
frame_extractor:
  padding_ratio: 0.15            # 正常 padding 倍率（大目标使用）
  keyframe_interval: 1           # 每隔几帧提取一帧关键帧
  keyframe_count: 1              # 提取的关键帧数量上限
  min_region_size: 32            # 最小有效区域像素（过小则跳过）
  adaptive_padding: true         # 自适应 padding（小目标自动放大 padding）
  pixel_threshold: 20000         # 最小裁剪面积阈值（像素²），低于此值自动增大 padding

# 行为类别定义（可扩展）
behavior_classes:
  - id: "0"
    label_cn: 溺水
    label_en: drowning
    severity: critical            # critical / warning / normal
    description: >
      四肢无规律挣扎，有溺水风险。

  - id: "1"
    label_cn: 游泳
    label_en: swimming
    severity: normal
    description: >
      人员在水中正常游泳。

  - id: "2"
    label_cn: 攀爬栏杆
    label_en: climbing
    severity: warning
    description: >
      人员攀爬或翻越栏杆。

  - id: "3"
    label_cn: 正常行走
    label_en: normal_walking
    severity: normal
    description: >
      岸上人员正常行走或站立。

  - id: "4"
    label_cn: 正在救援
    label_en: waterhelping
    severity: normal
    description: >
      水中人员抱住红色救生圈。

  - id: "5"
    label_cn: 在船上
    label_en: abord
    severity: normal
    description: >
      人员在船上或在开船。

# 视频源配置
video_source:
  camera_id: 0                   # USB 摄像头 ID
  rtsp_url: ""                   # RTSP 流地址
  frame_width: 640               # 目标帧宽度（0=保持原始）
  frame_height: 480              # 目标帧高度（0=保持原始）
  reconnect_threshold: 10        # 连续失败帧数触发重连
  reconnect_delay: 2.0           # 重连等待时间（秒）

# 输出配置
output:
  save_annotated: true           # 保存标注后的帧
  save_crops: true               # 保存人体裁剪图
  save_report: true              # 保存行为分析报告
  output_dir: "output"           # 输出目录
  report_format: "json"          # 报告格式: json / csv

# 流水线配置
pipeline:
  process_every_n_frames: 1   # 每 N 帧处理一次（降低 API 调用频率）
  max_concurrent: 1              # 最大并发 API 请求数
  alert_cooldown: 5            # 同一行为告警冷却时间（秒）
  display: true                  # 是否显示实时画面（需要 GUI）、视频窗口缩放比例
  display_scale: 0.1             # 视频窗口缩放比例
  camera_interval: 0.1           # 摄像头调用间隔（秒）
  sustained_detection_frames: 1  # 连续N帧检测到目标才触发API调用（需求3）

# 摄像头日志配置（需求2）
camera_log:
  enabled: true               # 是否启用摄像头行为日志
  retention_hours: 2.0        # 日志保留时长（小时），超过自动删除
  log_filename: "camera_behavior_log.json"  # 日志文件名
